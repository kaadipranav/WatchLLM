name = "watchllm-chaos-worker"
main = "worker/chaos_worker.ts"
compatibility_date = "2026-03-07"
workers_dev = true

# Non-secret worker runtime vars.
[vars]
NEXT_PUBLIC_SUPABASE_URL = "https://your-project-ref.supabase.co"

# Cloudflare R2 binding used by worker/chaos_worker.ts as env.TRACES_BUCKET.
[[r2_buckets]]
binding = "TRACES_BUCKET"
bucket_name = "watchllm-traces"
preview_bucket_name = "watchllm-traces"

# Secrets are intentionally not stored in wrangler.toml.
# Set them with:
#   wrangler secret put GROQ_API_KEY
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
